name: Auto-cleanup

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly, Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Prettier
        run: npm install --no-save --global prettier@3

      - name: Run Prettier on Markdown and YAML
        run: |
          prettier --write --no-error-on-unmatched-pattern \
            "**/*.md" \
            "**/*.yml" \
            "**/*.yaml" \
            "!node_modules/**" \
            "!.git/**"

      - name: Create pull request if changes
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore: weekly auto-cleanup (prettier)'
          title: 'chore: weekly auto-cleanup'
          body: |
            Weekly automated Prettier pass over `*.md` / `*.yml` / `*.yaml`.

            - Close without merging if the diff is empty.
            - If the diff is surprising, tune `.prettierrc` and re-run.
            - Merge normally after review if the formatting looks right.
          branch: chore/weekly-auto-cleanup
          delete-branch: true
          labels: |
            chore
            skip-changelog
            ci
